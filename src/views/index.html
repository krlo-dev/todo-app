<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem; }
        .container { background: white; border-radius: 8px; padding: 2rem; width: 100%; max-width: 500px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        .form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .form input { flex: 1; padding: 0.6rem 0.8rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; outline: none; }
        .form input:focus { border-color: #333; }
        .form button { padding: 0.6rem 1rem; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .form button:hover { background: #555; }
        .todo-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
        .todo-item:last-child { border-bottom: none; }
        .todo-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .todo-item span { flex: 1; font-size: 0.9rem; }
        .todo-item span.done { text-decoration: line-through; color: #999; }
        .btn-del { background: none; border: none; cursor: pointer; color: #999; font-size: 1rem; }
        .btn-del:hover { color: #c0392b; }
        .empty { text-align: center; color: #999; padding: 2rem 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 To-Do List</h1>
        <div class="form">
            <input type="text" id="nuevo" placeholder="Nueva tarea..." />
            <button onclick="agregar()">Agregar</button>
        </div>
        <div id="lista"></div>
    </div>

    <script>
        async function cargar() {
            const res = await fetch('/todos');
            const todos = await res.json();
            const lista = document.getElementById('lista');
            if (!todos.length) {
                lista.innerHTML = '<div class="empty">No hay tareas aún</div>';
                return;
            }
            lista.innerHTML = todos.map(t => `
                <div class="todo-item" id="item-${t.id}">
                    <input type="checkbox" ${t.completado ? 'checked' : ''} onchange="toggle(${t.id}, this.checked)" />
                    <span class="${t.completado ? 'done' : ''}">${t.titulo}</span>
                    <button class="btn-del" onclick="eliminar(${t.id})">✕</button>
                </div>
            `).join('');
        }

        async function agregar() {
            const input = document.getElementById('nuevo');
            if (!input.value.trim()) return;
            await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo: input.value.trim() })
            });
            input.value = '';
            cargar();
        }

        async function toggle(id, completado) {
            await fetch(`/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ completado: completado ? 1 : 0 })
            });
            cargar();
        }

        async function eliminar(id) {
            await fetch(`/todos/${id}`, { method: 'DELETE' });
            cargar();
        }

        document.getElementById('nuevo').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') agregar();
        });

        cargar();
    </script>
</body>
</html>
